<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" fill="none">
  <!-- Modern Abstract Icon representing Agent Matching (Nodes connecting) -->
  <g transform="translate(10, 10)">
    <!-- Gradient Definitions -->
    <defs>
      <linearGradient id="purpleGradient" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#A78BFA" />
        <stop offset="100%" stop-color="#6366F1" />
      </linearGradient>
      <linearGradient id="cyanGradient" x1="20" y1="0" x2="100" y2="80" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#22D3EE" />
        <stop offset="100%" stop-color="#06B6D4" />
      </linearGradient>
      <linearGradient id="amberGradient" x1="40" y1="20" x2="120" y2="100" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#FBBF24" />
        <stop offset="100%" stop-color="#F59E0B" />
      </linearGradient>
    </defs>

    <!-- Logo Graphics (Nodes connecting in a K-shape/Infinity motion) -->
    <circle cx="30" cy="50" r="14" fill="url(#purpleGradient)" />
    <path d="M30 50 L70 25" stroke="#A78BFA" stroke-width="6" stroke-linecap="round" stroke-opacity="0.8" />
    <path d="M30 50 L70 75" stroke="#22D3EE" stroke-width="6" stroke-linecap="round" stroke-opacity="0.8" />
    <path d="M70 25 L100 50" stroke="#FBBF24" stroke-width="6" stroke-linecap="round" stroke-opacity="0.8" />
    <path d="M70 75 L100 50" stroke="#22D3EE" stroke-width="6" stroke-linecap="round" stroke-opacity="0.8" />
    
    <circle cx="70" cy="25" r="12" fill="url(#cyanGradient)" />
    <circle cx="70" cy="75" r="12" fill="url(#purpleGradient)" />
    <circle cx="100" cy="50" r="16" fill="url(#amberGradient)" />
    
    <!-- Central pulse indicator -->
    <circle cx="100" cy="50" r="6" fill="#111827" opacity="0.9" />
    <circle cx="100" cy="50" r="3" fill="#22D3EE" />
  </g>

  <!-- Typography (Dark Mode) -->
  <text x="140" y="66" fill="#F9FAFB" font-family="'Outfit', 'Inter', sans-serif" font-size="42" font-weight="800" letter-spacing="-1">Kola<tspan fill="#A78BFA">Agent</tspan></text>
  <text x="142" y="88" fill="#9CA3AF" font-family="'Inter', sans-serif" font-size="12" font-weight="600" letter-spacing="4">BY KOLABORATE</text>
</svg>
